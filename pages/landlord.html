<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>AgriFlow — Landlord</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div id="page-loader" class="page-loader">
  <div class="spinner"></div>
  <div class="loader-msg">Loading...</div>
</div>
<div id="toast-root"></div>
<script type="module">
import { auth, db } from "../js/firebase.js";
import { getUserDoc, logout } from "../js/auth.js";
import { initTheme, hideLoader, loaderError } from "../js/ui.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
initTheme();
onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = '../index.html'; return; }
  try {
    const data = await getUserDoc(user.uid);
    if (!data || data.role !== 'landlord' || data.status === 'suspended') {
      window.location.href = '../index.html'; return;
    }
    hideLoader();
    document.body.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center">
        <div style="font-size:48px;margin-bottom:16px">👑</div>
        <div style="font-size:20px;font-weight:800;margin-bottom:8px">Welcome, ${data.name}!</div>
        <div style="color:var(--muted);font-size:14px;margin-bottom:24px">Landlord dashboard — Stage 2 coming next</div>
        <button class="btn btn-outline btn-sm" onclick="logout()">🚪 Logout</button>
      </div>
      <div id="toast-root"></div>`;
    window.logout = logout;
  } catch(e) { loaderError(e.message); }
});
</script>
</body>
</html>
