      <div class="topbar-right">
        <div class="online-dot" id="online-dot"></div>

    <div class="page-content">

        <div class="section-header">

      <!-- LANDLORDS -->

          <button class="btn btn-primary btn-sm" onclick="openM('modal-create-landlord')">➕ Add</button>

      <div data-tab-content="allusers" class="hidden">

    <div class="alert" id="mg-alert"></div>
    <div class="form-group"><label class="form-label">Full Name *</label><input class="form-input" id="mg-name" placeholder="Ali Hassan"/></div>

<script type="module">
import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, browserLocalPersistence, setPersistence, onAuthStateChanged, signOut,
         createUserWithEmailAndPassword,
         sendPasswordResetEmail }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc,
         collection, getDocs, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const CONFIG = {
  apiKey:"AIzaSyDpTPibk-7_kqyJdfN94KrLlcKkoNnqIYE",
  authDomain:"farmledger-e85e3.firebaseapp.com",
  projectId:"farmledger-e85e3",
  storageBucket:"farmledger-e85e3.firebasestorage.app",
  messagingSenderId:"922324809308",
  appId:"1:922324809308:web:05c015ce12e55034e99899"
};
const app=initializeApp(CONFIG), auth=getAuth(app);
setPersistence(auth,browserLocalPersistence).catch(()=>{});
=>{});
const db=getFirestore(app);
let ME=null, allUsers=[], allLandlords=[], allManagers=[], activeEmail='';

// ── Theme ─────────────────────────────────────────────────
const initTheme=()=>document.documentElement.setAttribute('data-theme',localStorage.getItem('af_theme')||'dark');
window.toggleTheme=()=>{const n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('af_theme',n);};
initTheme();

// ── Toast ─────────────────────────────────────────────────
function toast(msg,type='success'){
  const r=document.getElementById('toast-root'),el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<span>${{success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'}[type]||'✅'}</span><span>${msg}</span>`;
  r.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300);},3500);
}

// ── Alert ─────────────────────────────────────────────────
function setAlert(id,msg,type='error'){const el=document.getElementById(id);if(el){el.textContent=msg;el.className=`alert show ${type}`;}}
function clrAlert(id){const el=document.getElementById(id);if(el)el.className='alert';}

// ── Loader ────────────────────────────────────────────────
function hideLoader(){const el=document.getElementById('page-loader');if(el){el.classList.add('hidden');}}

// ── Skeleton Loaders ──────────────────────────────────────
function showSkeleton() {
  const statsGrid = document.getElementById('stats-grid');
  if (statsGrid) {
    statsGrid.innerHTML = `
      ${[1,2,3,4].map(()=>`
        <div class="skeleton-stat">
          <div class="skeleton skeleton-text" style="width:40px;height:40px;border-radius:10px"></div>
          <div class="skeleton skeleton-text" style="width:60%;margin-top:4px"></div>
          <div class="skeleton skeleton-title" style="width:40%;margin-top:6px"></div>
        </div>`).join('')}`;
  }
}

function loaderErr(msg){document.getElementById('page-loader').innerHTML=`<div style="text-align:center;padding:24px"><div style="font-size:36px;margin-bottom:12px">⚠️</div><div style="color:var(--danger);font-weight:700;margin-bottom:8px">Error</div><div style="color:var(--muted);font-size:13px;margin-bottom:20px">${msg}</div><button class="btn btn-outline btn-sm" onclick="location.reload()">🔄 Retry</button></div>`;}

// ── Modal — named openM/closeM to avoid any conflicts ─────
window.openM = id => { const el=document.getElementById(id); if(el) el.classList.add('open'); };
window.closeM = id => { const el=document.getElementById(id); if(el) el.classList.remove('open'); };
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));

// ── Sidebar ───────────────────────────────────────────────
document.getElementById('hamburger').addEventListener('click',()=>{document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebar-overlay').classList.toggle('show');});
document.getElementById('sidebar-overlay').addEventListener('click',()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('show');});
function closeSB(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('show');}

// ── Tabs ──────────────────────────────────────────────────
const TAB_TITLES={overview:'Overview',landlords:'Landlords',managers:'Managers',allusers:'All Users'};
window.switchTab=function(tab){
  document.querySelectorAll('[data-tab-btn]').forEach(b=>b.classList.toggle('active',b.dataset.tabBtn===tab));
  document.querySelectorAll('[data-tab-content]').forEach(c=>c.classList.toggle('hidden',c.dataset.tabContent!==tab));
  document.getElementById('page-title').textContent=TAB_TITLES[tab]||tab;
  closeSB();
};
document.querySelectorAll('[data-tab-btn]').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tabBtn)));

// ── Online ────────────────────────────────────────────────
function updOnline(){const on=navigator.onLine;document.getElementById('online-dot').classList.toggle('off',!on);document.getElementById('offline-bar').classList.toggle('show',!on);}
window.addEventListener('online',updOnline);window.addEventListener('offline',updOnline);updOnline();

// ── Action Menu ───────────────────────────────────────────
window.showMenu=function(btn,uid){
  const u=allUsers.find(x=>x.uid===uid); if(!u)return;
  const menu=document.getElementById('action-menu');
  const sus=u.status==='suspended';
  menu.innerHTML=`
    <button class="action-menu-item" onclick="openEditModal('${uid}')">✏️ Edit</button>
    <button class="action-menu-item" onclick="openResetModal('${u.email||''}')">🔑 Reset Password</button>
    <div class="action-menu-divider"></div>
    <button class="action-menu-item" onclick="toggleSuspend('${uid}','${u.status||'active'}','${u.name||''}')">${sus?'✅ Activate':'🚫 Suspend'}</button>
    <div class="action-menu-divider"></div>
    <button class="action-menu-item danger" onclick="deleteUser('${uid}','${u.name||''}')">🗑️ Delete</button>`;
  const r=btn.getBoundingClientRect();
  let left=r.right-190,top=r.bottom+4;
  if(left<8)left=8; if(top+220>window.innerHeight)top=r.top-220;
  menu.style.cssText=`left:${left}px;top:${top}px`; menu.classList.add('open');
};
document.addEventListener('click',e=>{if(!e.target.closest('.action-menu')&&!e.target.closest('[onclick*="showMenu"]'))document.getElementById('action-menu').classList.remove('open');});

// ── Format ────────────────────────────────────────────────
function fmtDate(ts){if(!ts)return '—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('en-PK',{day:'numeric',month:'short',year:'numeric'});}
function ini(n){return(n||'?').charAt(0).toUpperCase();}

// ── Logout ────────────────────────────────────────────────
window.doLogout=async function(){if(!confirm('Logout?'))return;try{localStorage.removeItem('af_user');}catch(e){}await signOut(auth);window.location.href='../index.html';};

// ── Auth Guard ────────────────────────────────────────────
const _waitForAuth=new Promise(resolve=>{const u=onAuthStateChanged(auth,user=>{u();resolve(user);});});
_waitForAuth.then(async user=>{
  const uid=user?user.uid:null;
  if(!uid){
    try{
      const cached=JSON.parse(localStorage.getItem('af_user')||'null');
      if(cached&&cached.role==='admin'&&cached.status!=='suspended'){
        ME=cached;
        document.getElementById('user-name').textContent=ME.name||'Admin';
        document.getElementById('user-avatar').textContent=ini(ME.name);
        showSkeleton();await loadAll();hideLoader();return;
      }
    }catch(e){}
    window.location.replace('../index.html');return;
  }
  try{
    const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error('Connection timeout')),12000));
    const snap=await Promise.race([getDoc(doc(db,'users',uid)),timeout]);
    if(!snap.exists()){loaderErr('Account not found.');return;}
    const data=snap.data();
    if(data.role!=='admin'){loaderErr('Wrong role: '+data.role);return;}
    if(data.status==='suspended'){loaderErr('Account suspended.');return;}
    ME={uid,...data};
    try{localStorage.setItem('af_user',JSON.stringify({uid,...data,cachedAt:Date.now()}));}catch(e){}
    document.getElementById('user-name').textContent=ME.name||'Admin';
    document.getElementById('user-avatar').textContent=ini(ME.name);
    showSkeleton();await loadAll();hideLoader();
  }catch(e){
    try{
      const cached=JSON.parse(localStorage.getItem('af_user')||'null');
      if(cached&&cached.uid===uid&&cached.role==='admin'){
        ME=cached;
        document.getElementById('user-name').textContent=ME.name||'Admin';
        document.getElementById('user-avatar').textContent=ini(ME.name);
        showSkeleton();await loadAll();hideLoader();return;
      }
    }catch(ce){}
    loaderErr(e.message);
  }
});

// ── Load ──────────────────────────────────────────────────
async function safeGet(q){
  try{
    const t=new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),8000));
    return await Promise.race([getDocs(q),t]);
  }catch(e){console.warn('Query:',e.message);return{docs:[]};}
}

async function loadAll(){
  try{
    const snap=await safeGet(collection(db,'users'));
    allUsers=snap.docs.map(d=>({uid:d.id,...d.data()}));
    allLandlords=allUsers.filter(u=>u.role==='landlord');
    allManagers=allUsers.filter(u=>u.role==='manager');
    // Populate landlord dropdown for create manager
    document.getElementById('mg-landlord').innerHTML=
      '<option value="">Select landlord...</option>'+
      allLandlords.map(l=>`<option value="${l.uid}">${l.name}</option>`).join('');
    renderOverview(); renderLL(allLandlords); renderMG(allManagers); renderUSR(allUsers);
  }catch(e){toast('Load error: '+e.message,'error');}
}

// ── User Row ──────────────────────────────────────────────
function userRow(u,avatarColor,avatarBg,sub){
  return `<div style="display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border)">
    <div style="display:flex;align-items:center;gap:11px;min-width:0;flex:1">
      <div style="width:40px;height:40px;border-radius:10px;background:${avatarBg};display:flex;align-items:center;justify-content:center;font-weight:800;color:${avatarColor};font-size:16px;flex-shrink:0">${ini(u.name)}</div>
      <div style="min-width:0">
        <div style="font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.name}</div>
        <div style="font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.email||'—'}</div>
        ${sub?`<div style="font-size:11px;color:var(--primary);margin-top:1px">${sub}</div>`:''}
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:8px">
      <span class="badge ${u.status==='suspended'?'badge-red':'badge-green'}">${u.status||'active'}</span>
      <button class="btn btn-ghost btn-sm" onclick="showMenu(this,'${u.uid}')">⋮</button>
    </div>
  </div>`;
}

// ── Overview ──────────────────────────────────────────────
function renderOverview(){
  const active=allUsers.filter(u=>u.status!=='suspended').length;
  document.getElementById('overview-sub').textContent=`${allUsers.length} users · ${active} active`;
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card"><div class="stat-icon">👑</div><div class="stat-label">Landlords</div><div class="stat-value">${allLandlords.length}</div></div>
    <div class="stat-card"><div class="stat-icon">👨‍💼</div><div class="stat-label">Managers</div><div class="stat-value">${allManagers.length}</div></div>
    <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-label">Active</div><div class="stat-value" style="color:var(--primary)">${active}</div></div>
    <div class="stat-card"><div class="stat-icon">🚫</div><div class="stat-label">Suspended</div><div class="stat-value" style="color:var(--danger)">${allUsers.length-active}</div></div>`;
  document.getElementById('overview-landlords').innerHTML=allLandlords.length===0
    ?`<div class="empty-state"><div class="empty-icon">👑</div><div class="empty-title">No landlords yet</div></div>`
    :allLandlords.slice(0,5).map(u=>userRow(u,'var(--primary)','var(--primary-dim)',null)).join('');
}

// ── Landlords ─────────────────────────────────────────────
function renderLL(list){
  document.getElementById('ll-sub').textContent=`${list.length} landlord${list.length!==1?'s':''}`;
  document.getElementById('ll-list').innerHTML=list.length===0
    ?`<div class="empty-state"><div class="empty-icon">👑</div><div class="empty-title">No landlords yet</div></div>`
    :list.map(u=>userRow(u,'var(--primary)','var(--primary-dim)',null)).join('');
}
window.filterLL=v=>renderLL(v?allLandlords.filter(u=>(u.name+u.email).toLowerCase().includes(v.toLowerCase())):allLandlords);

// ── Managers ──────────────────────────────────────────────
function renderMG(list){
  document.getElementById('mg-sub').textContent=`${list.length} manager${list.length!==1?'s':''}`;
  document.getElementById('mg-list').innerHTML=list.length===0
    ?`<div class="empty-state"><div class="empty-icon">👨‍💼</div><div class="empty-title">No managers yet</div></div>`
    :list.map(u=>{
      const ll=allLandlords.find(l=>l.uid===u.landlordId);
      return userRow(u,'var(--info)','rgba(96,165,250,0.12)',ll?`👑 ${ll.name}`:null);
    }).join('');
}
window.filterMG=v=>renderMG(v?allManagers.filter(u=>(u.name+u.email).toLowerCase().includes(v.toLowerCase())):allManagers);

// ── All Users ─────────────────────────────────────────────
function renderUSR(list){
  const RC={admin:'badge-gray',landlord:'badge-gold',manager:'badge-blue'};
  const RI={admin:'⚙️',landlord:'👑',manager:'👨‍💼'};
  document.getElementById('usr-list').innerHTML=list.length===0
    ?`<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">No users</div></div>`
    :list.map(u=>`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:11px;min-width:0;flex:1">
          <div style="width:40px;height:40px;border-radius:10px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${RI[u.role]||'👤'}</div>
          <div style="min-width:0">
            <div style="font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.name}</div>
            <div style="font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.email||'—'}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:2px">${fmtDate(u.createdAt)}</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;margin-left:8px">
          <span class="badge ${RC[u.role]||'badge-gray'}">${u.role}</span>
          <span class="badge ${u.status==='suspended'?'badge-red':'badge-green'}">${u.status||'active'}</span>
        </div>
      </div>`).join('');
}
window.filterUSR=function(){
  const v=document.getElementById('usr-search').value.toLowerCase();
  const r=document.getElementById('usr-role').value;
  let list=allUsers;
  if(v)list=list.filter(u=>(u.name+(u.email||'')).toLowerCase().includes(v));
  if(r)list=list.filter(u=>u.role===r);
  renderUSR(list);
};

// ── Create User (shared helper) ───────────────────────────
async function createUser(email, pass, firestoreData, alertId, btnId, successMsg) {
  let secondApp=null;
  try{
    secondApp=initializeApp(CONFIG,'sec_'+Date.now());
    const secAuth=getAuth(secondApp);
    const cred=await createUserWithEmailAndPassword(secAuth,email,pass);
    await setDoc(doc(db,'users',cred.user.uid),{
      uid:cred.user.uid, email, ...firestoreData,
      status:'active', createdBy:ME.uid, createdAt:serverTimestamp()
    });
    await deleteApp(secondApp); secondApp=null;
    toast(successMsg);
    return {success:true, uid:cred.user.uid};
  }catch(e){
    if(secondApp){try{await deleteApp(secondApp);}catch{}}
    const MSGS={'auth/email-already-in-use':'❌ Email already registered.','auth/weak-password':'❌ Password too weak.','auth/invalid-email':'❌ Invalid email.'};
    setAlert(alertId, MSGS[e.code]||'❌ '+e.message);
    return {success:false};
  }
}

// ── Create Landlord ───────────────────────────────────────
window.createLandlord=async function(){
  const name=document.getElementById('ll-name').value.trim();
  const email=document.getElementById('ll-email').value.trim();
  const pass=document.getElementById('ll-pass').value;
  const phone=document.getElementById('ll-phone').value.trim();
  const btn=document.getElementById('ll-btn');
  clrAlert('ll-alert');
  if(!name||!email||!pass){setAlert('ll-alert','⚠️ Name, email and password required.');return;}
  if(pass.length<8){setAlert('ll-alert','⚠️ Password must be at least 8 characters.');return;}
  btn.disabled=true; btn.textContent='⏳ Creating...';
  const r=await createUser(email,pass,{name,phone:phone||'',role:'landlord'},'ll-alert','ll-btn',`✅ ${name} created as Landlord!`);
  if(r.success){
    closeM('modal-create-landlord');
    ['ll-name','ll-email','ll-pass','ll-phone'].forEach(id=>document.getElementById(id).value='');
    await loadAll();
  }
  btn.disabled=false; btn.textContent='✅ Create Landlord';
};

// ── Create Manager ────────────────────────────────────────
window.createManager=async function(){
  const name=document.getElementById('mg-name').value.trim();
  const email=document.getElementById('mg-email').value.trim();
  const pass=document.getElementById('mg-pass').value;
  const phone=document.getElementById('mg-phone').value.trim();
  const landlordId=document.getElementById('mg-landlord').value;
  const btn=document.getElementById('mg-btn');
  clrAlert('mg-alert');
  if(!name||!email||!pass){setAlert('mg-alert','⚠️ Name, email and password required.');return;}
  if(pass.length<8){setAlert('mg-alert','⚠️ Password must be at least 8 characters.');return;}
  if(!landlordId){setAlert('mg-alert','⚠️ Please select a landlord.');return;}
  btn.disabled=true; btn.textContent='⏳ Creating...';
  const r=await createUser(email,pass,{name,phone:phone||'',role:'manager',landlordId},'mg-alert','mg-btn',`✅ ${name} created as Manager!`);
  if(r.success){
    closeM('modal-create-manager');
    ['mg-name','mg-email','mg-pass','mg-phone'].forEach(id=>document.getElementById(id).value='');
    await loadAll();
  }
  btn.disabled=false; btn.textContent='✅ Create Manager';
};

// ── Edit ──────────────────────────────────────────────────
window.openEditModal=function(uid){
  const u=allUsers.find(x=>x.uid===uid); if(!u)return;
  document.getElementById('edit-uid').value=uid;
  document.getElementById('edit-name').value=u.name||'';
  document.getElementById('edit-phone').value=u.phone||'';
  document.getElementById('edit-status').value=u.status||'active';
  clrAlert('edit-alert'); openM('modal-edit');
};
window.saveEdit=async function(){
  const uid=document.getElementById('edit-uid').value;
  const name=document.getElementById('edit-name').value.trim();
  const phone=document.getElementById('edit-phone').value.trim();
  const status=document.getElementById('edit-status').value;
  if(!name){setAlert('edit-alert','⚠️ Name required.');return;}
  try{await updateDoc(doc(db,'users',uid),{name,phone,status,updatedAt:serverTimestamp()});toast('✅ Updated!');closeM('modal-edit');await loadAll();}
  catch(e){setAlert('edit-alert','❌ '+e.message);}
};

// ── Suspend ───────────────────────────────────────────────
window.toggleSuspend=async function(uid,current,name){
  const next=current==='suspended'?'active':'suspended';
  if(!confirm(`${next==='suspended'?'Suspend':'Activate'} ${name}?`))return;
  try{await updateDoc(doc(db,'users',uid),{status:next,updatedAt:serverTimestamp()});toast(`${next==='suspended'?'🚫':'✅'} ${name}`);await loadAll();}
  catch(e){toast('❌ '+e.message,'error');}
};

// ── Reset Password ────────────────────────────────────────
window.openResetModal=function(email){
  activeEmail=email;
  document.getElementById('reset-label').textContent=email;
  clrAlert('reset-alert'); openM('modal-reset');
};
window.sendReset=async function(){
  const btn=document.getElementById('reset-btn');
  btn.disabled=true; btn.textContent='⏳ Sending...';
  try{
    await sendPasswordResetEmail(auth,activeEmail);
    setAlert('reset-alert','✅ Reset email sent!','success');
    toast('✅ Reset email sent!');
    setTimeout(()=>closeM('modal-reset'),2000);
  }catch(e){setAlert('reset-alert','❌ '+e.message);}
  btn.disabled=false; btn.textContent='📧 Send Email';
};

// ── Delete ────────────────────────────────────────────────
window.deleteUser=async function(uid,name){
  if(!confirm(`Delete ${name}? Removes Firestore record only.`))return;
  try{await deleteDoc(doc(db,'users',uid));toast(`🗑️ ${name} deleted`,'warning');await loadAll();}
  catch(e){toast('❌ '+e.message,'error');}
};
