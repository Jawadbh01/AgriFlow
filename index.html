<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>AgriFlow — Login</title>
  <meta name="theme-color" content="#080d08"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="images/icon-192.png"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
    .wrap{width:100%;max-width:400px;}
    .brand{text-align:center;margin-bottom:32px;}
    .brand-icon{width:76px;height:76px;background:linear-gradient(135deg,#22c55e,#16a34a);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 14px;box-shadow:0 8px 32px rgba(34,197,94,0.35);}
    .brand-name{font-size:30px;font-weight:800;letter-spacing:-0.5px;}
    .brand-tag{font-size:13px;color:var(--muted);margin-top:4px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-xl);padding:30px 24px;}
    .card-title{font-size:19px;font-weight:800;margin-bottom:4px;}
    .card-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
    .pass-wrap{position:relative;}
    .pass-wrap .form-input{padding-right:48px;}
    .pass-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;line-height:1;font-family:var(--font);}
    .footer{text-align:center;margin-top:16px;font-size:12px;color:var(--muted);}
    .theme-row{text-align:center;margin-top:16px;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-icon">🌾</div>
    <div class="brand-name">AgriFlow</div>
    <div class="brand-tag">Farm Management System</div>
  </div>
  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to your account</div>
    <div class="alert" id="login-alert"></div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="pass-wrap">
        <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
        <button class="pass-btn" id="pass-btn" type="button">👁️</button>
      </div>
    </div>
    <button class="btn btn-primary btn-full" id="login-btn" type="button">Sign In</button>
    <div class="footer">AgriFlow V3 · Secure Farm Management</div>
  </div>
  <div class="theme-row">
    <button class="btn btn-ghost btn-sm" id="theme-btn" type="button">☀️ Light</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, browserLocalPersistence, setPersistence,
         signInWithEmailAndPassword, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const CONFIG = {
  apiKey:"AIzaSyDpTPibk-7_kqyJdfN94KrLlcKkoNnqIYE",
  authDomain:"farmledger-e85e3.firebaseapp.com",
  projectId:"farmledger-e85e3",
  storageBucket:"farmledger-e85e3.firebasestorage.app",
  messagingSenderId:"922324809308",
  appId:"1:922324809308:web:05c015ce12e55034e99899"
};

const ROUTES = {
  admin:    'pages/admin.html',
  landlord: 'pages/landlord.html',
  manager:  'pages/manager.html'
};

const app = initializeApp(CONFIG);
const auth = getAuth(app);
const db = getFirestore(app);

// Set persistence so session survives app close
setPersistence(auth, browserLocalPersistence).catch(() => {});

// Theme
function initTheme() {
  const t = localStorage.getItem('af_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-btn').textContent = t === 'dark' ? '☀️ Light' : '🌙 Dark';
}
initTheme();

document.getElementById('theme-btn').onclick = function() {
  const n = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', n);
  localStorage.setItem('af_theme', n);
  this.textContent = n === 'dark' ? '☀️ Light' : '🌙 Dark';
};

// Password toggle
document.getElementById('pass-btn').onclick = function() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
};

// Enter key
document.getElementById('email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

// Login button
document.getElementById('login-btn').onclick = login;

function showErr(msg) {
  const el = document.getElementById('login-alert');
  el.textContent = msg;
  el.className = 'alert show error';
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  const btn   = document.getElementById('login-btn');

  document.getElementById('login-alert').className = 'alert';

  if (!email || !pass) {
    showErr('⚠️ Please enter email and password.');
    return;
  }

  btn.disabled = true;
  btn.textContent = '⏳ Signing in...';

  try {
    // Sign in
    const cred = await signInWithEmailAndPassword(auth, email, pass);

    btn.textContent = '⏳ Loading...';

    // Get user role
    const snap = await getDoc(doc(db, 'users', cred.user.uid));

    if (!snap.exists()) {
      await signOut(auth);
      showErr('❌ Account not found. Contact admin.');
      btn.disabled = false; btn.textContent = 'Sign In';
      return;
    }

    const data = snap.data();

    if (data.status === 'suspended') {
      await signOut(auth);
      showErr('🚫 Account suspended. Contact admin.');
      btn.disabled = false; btn.textContent = 'Sign In';
      return;
    }

    if (!data.role || !ROUTES[data.role]) {
      await signOut(auth);
      showErr('❌ Unknown role: ' + (data.role || 'none'));
      btn.disabled = false; btn.textContent = 'Sign In';
      return;
    }

    // Redirect
    btn.textContent = '✅ Redirecting...';
    window.location.replace(ROUTES[data.role]);

  } catch (e) {
    const MSGS = {
      'auth/user-not-found':     '❌ No account with this email.',
      'auth/wrong-password':     '❌ Wrong password.',
      'auth/invalid-email':      '❌ Invalid email format.',
      'auth/invalid-credential': '❌ Email or password is incorrect.',
      'auth/too-many-requests':  '⚠️ Too many attempts. Try again later.',
      'auth/network-request-failed': '📶 No internet connection.',
    };
    showErr(MSGS[e.code] || '❌ ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/AgriFlow/sw.js').catch(() => {});
}
</script>
</body>
</html>
